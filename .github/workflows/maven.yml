name: Selenium Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Build project with Maven
      - name: Build with Maven
        run: mvn -B package
        working-directory: RestassuredBasicDemo

      # Step 4: Run Selenium tests
      - name: Run Selenium Tests
        run: mvn test
        working-directory: RestassuredBasicDemo

      # Step 5: Upload test results (optional)
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: RestassuredBasicDemo/target/surefire-reports
